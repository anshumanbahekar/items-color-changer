<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item's Colour Changer</title>
</head>
<body>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .app { padding: 1.5rem 1rem; }
  .title { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
  .sub { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin-bottom: 1.5rem; }
  .card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 1rem;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card.selected { border: 2px solid var(--color-border-info); }
  .card svg { width: 72px; height: 72px; display: block; }
  .card-label { font-size: 13px; color: var(--color-text-secondary); font-weight: 500; }
  .badge {
    position: absolute; top: 6px; right: 8px;
    font-size: 10px; padding: 2px 6px;
    background: var(--color-background-info); color: var(--color-text-info);
    border-radius: var(--border-radius-md);
    opacity: 0;
  }
  .card.selected .badge { opacity: 1; }
  .controls { display: flex; flex-direction: column; gap: 12px; }
  .ctrl-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .ctrl-label { font-size: 13px; color: var(--color-text-secondary); min-width: 60px; }
  .palette { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
  .swatch.active { border-color: var(--color-border-primary); }
  .swatch-custom { display: flex; align-items: center; gap: 6px; }
  input[type=color] { width: 28px; height: 28px; border-radius: 50%; border: 0.5px solid var(--color-border-secondary); cursor: pointer; padding: 0; background: none; }
  .sep { height: 0.5px; background: var(--color-border-tertiary); margin: 4px 0; }
  .action-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { cursor: pointer; border: 0.5px solid var(--color-border-secondary); background: transparent; border-radius: var(--border-radius-md); padding: 6px 14px; font-size: 13px; color: var(--color-text-primary); }
  .btn.accent { background: var(--color-background-info); color: var(--color-text-info); border-color: transparent; }
  .selected-hint { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; }
</style>

<div class="app">
  <h2 class="sr-only">Items color changer 🎨</h2>

  <div class="grid" id="grid">

    <!-- Backpack -->
    <div class="card" data-id="bag" onclick="toggleItem(this)">
      <span class="badge">✅ selected</span>
      <svg viewBox="0 0 72 72"><rect x="18" y="22" width="36" height="38" rx="7" fill="#4A90E2" id="bag-body"/><rect x="26" y="16" width="20" height="14" rx="6" fill="#357ABD" id="bag-strap-top"/><rect x="22" y="38" width="28" height="12" rx="4" fill="#5AA0F0" id="bag-pocket"/><rect x="32" y="42" width="8" height="4" rx="2" fill="#2A6AAF" id="bag-zip"/><line x1="24" y1="16" x2="20" y2="26" stroke="#357ABD" stroke-width="3" stroke-linecap="round" id="bag-sl"/><line x1="48" y1="16" x2="52" y2="26" stroke="#357ABD" stroke-width="3" stroke-linecap="round" id="bag-sr"/></svg>
      <div class="card-label">Backpack</div>
    </div>

    <!-- Pencil -->
    <div class="card" data-id="pencil" onclick="toggleItem(this)">
      <span class="badge">✅ selected</span>
      <svg viewBox="0 0 72 72"><rect x="31" y="10" width="10" height="42" rx="2" fill="#F5C842" id="pencil-body"/><polygon points="31,52 41,52 36,64" fill="#F0A500" id="pencil-tip"/><rect x="31" y="10" width="10" height="8" rx="2" fill="#C0856A" id="pencil-eraser-top"/><rect x="31" y="18" width="10" height="3" fill="#888" id="pencil-band"/><line x1="36" y1="55" x2="36" y2="64" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/></svg>
      <div class="card-label">Pencil</div>
    </div>

    <!-- Book -->
    <div class="card" data-id="book" onclick="toggleItem(this)">
      <span class="badge">✅ selected</span>
      <svg viewBox="0 0 72 72"><rect x="14" y="15" width="44" height="44" rx="4" fill="#E8493A" id="book-cover"/><rect x="20" y="15" width="6" height="44" fill="#C0392B" id="book-spine"/><rect x="26" y="20" width="26" height="3" rx="1.5" fill="#fff" opacity=".6"/><rect x="26" y="27" width="22" height="3" rx="1.5" fill="#fff" opacity=".6"/><rect x="26" y="34" width="24" height="3" rx="1.5" fill="#fff" opacity=".6"/><rect x="26" y="41" width="18" height="3" rx="1.5" fill="#fff" opacity=".6"/></svg>
      <div class="card-label">Book</div>
    </div>

    <!-- Ruler -->
    <div class="card" data-id="ruler" onclick="toggleItem(this)">
      <span class="badge">✅ selected</span>
      <svg viewBox="0 0 72 72"><rect x="10" y="28" width="52" height="16" rx="3" fill="#6DD47E" id="ruler-body"/><line x1="16" y1="28" x2="16" y2="36" stroke="#3a8a4a" stroke-width="1.5"/><line x1="22" y1="28" x2="22" y2="33" stroke="#3a8a4a" stroke-width="1.5"/><line x1="28" y1="28" x2="28" y2="36" stroke="#3a8a4a" stroke-width="1.5"/><line x1="34" y1="28" x2="34" y2="33" stroke="#3a8a4a" stroke-width="1.5"/><line x1="40" y1="28" x2="40" y2="36" stroke="#3a8a4a" stroke-width="1.5"/><line x1="46" y1="28" x2="46" y2="33" stroke="#3a8a4a" stroke-width="1.5"/><line x1="52" y1="28" x2="52" y2="36" stroke="#3a8a4a" stroke-width="1.5"/><line x1="58" y1="28" x2="58" y2="33" stroke="#3a8a4a" stroke-width="1.5"/></svg>
      <div class="card-label">Ruler</div>
    </div>

    <!-- Rocket (replacing scissors) -->
    <div class="card" data-id="rocket" onclick="toggleItem(this)">
      <span class="badge">✅ selected</span>
      <svg viewBox="0 0 72 72">
        <ellipse cx="36" cy="24" rx="10" ry="16" fill="#E74C3C" id="rocket-body"/>
        <ellipse cx="36" cy="16" rx="7" ry="8" fill="#C0392B" id="rocket-nose"/>
        <polygon points="26,36 18,50 26,46" fill="#E74C3C" id="rocket-fin-l"/>
        <polygon points="46,36 54,50 46,46" fill="#E74C3C" id="rocket-fin-r"/>
        <ellipse cx="36" cy="32" rx="5" ry="5" fill="#AED6F1" id="rocket-window"/>
        <ellipse cx="36" cy="32" rx="3" ry="3" fill="#5DADE2" id="rocket-window-inner"/>
        <ellipse cx="36" cy="50" rx="5" ry="7" fill="#F39C12" id="rocket-flame"/>
        <ellipse cx="36" cy="54" rx="3" ry="4" fill="#F9E79F" id="rocket-flame-inner"/>
      </svg>
      <div class="card-label">Rocket</div>
    </div>

    <!-- Crayon -->
    <div class="card" data-id="crayon" onclick="toggleItem(this)">
      <span class="badge">✅ selected</span>
      <svg viewBox="0 0 72 72"><rect x="29" y="14" width="14" height="38" rx="3" fill="#FF6B35" id="crayon-body"/><rect x="29" y="14" width="14" height="10" rx="3" fill="#C0440E" id="crayon-top"/><polygon points="29,52 43,52 36,64" fill="#D4531A" id="crayon-tip"/><rect x="29" y="38" width="14" height="4" fill="#E55A28" opacity=".5" id="crayon-stripe"/><line x1="36" y1="56" x2="36" y2="64" stroke="#8B2500" stroke-width="1.2" stroke-linecap="round"/></svg>
      <div class="card-label">Crayon</div>
    </div>

    <!-- Globe -->
    <div class="card" data-id="globe" onclick="toggleItem(this)">
      <span class="badge">✅ selected</span>
      <svg viewBox="0 0 72 72"><circle cx="36" cy="33" r="20" fill="#1A8CD8" id="globe-ocean"/><ellipse cx="36" cy="33" rx="8" ry="20" fill="none" stroke="#0A6FAF" stroke-width="1.5" id="globe-meridian"/><ellipse cx="36" cy="33" rx="20" ry="8" fill="none" stroke="#0A6FAF" stroke-width="1.5" id="globe-parallel"/><path d="M20,28 Q26,22 36,24 Q44,26 50,30" fill="#4DBF72" opacity=".85" id="globe-land"/><line x1="36" y1="53" x2="36" y2="64" stroke="#888" stroke-width="2" stroke-linecap="round"/><line x1="26" y1="64" x2="46" y2="64" stroke="#888" stroke-width="3" stroke-linecap="round"/></svg>
      <div class="card-label">Globe</div>
    </div>

    <!-- Water bottle -->
    <div class="card" data-id="bottle" onclick="toggleItem(this)">
      <span class="badge">✅ selected</span>
      <svg viewBox="0 0 72 72"><rect x="28" y="10" width="16" height="6" rx="2" fill="#2196F3" id="bottle-cap"/><rect x="24" y="16" width="24" height="46" rx="8" fill="#29B6F6" id="bottle-body"/><rect x="30" y="22" width="6" height="30" rx="3" fill="#fff" opacity=".25" id="bottle-shine"/><line x1="24" y1="34" x2="48" y2="34" stroke="#1E88E5" stroke-width="1" opacity=".5"/></svg>
      <div class="card-label">Water bottle</div>
    </div>

  </div>

  <div class="sep"></div>
  <div style="height:14px"></div>

  <div class="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">Colour Panel</span>
      <div class="palette" id="preset-palette"></div>
      <div class="swatch-custom">
        <input type="color" id="custom-color" value="#FF6B35" title="Custom color" oninput="applyCustomColor(this.value)"/>
        <span style="font-size:12px;color:var(--color-text-secondary)">Custom</span>
      </div>
    </div>
    <div class="action-row">
      <button class="btn" onclick="selectAll()">Select all</button>
      <button class="btn" onclick="deselectAll()">Deselect all</button>
      <button class="btn" onclick="randomize()">Fill Random</button>
      <button class="btn accent" onclick="resetColors()">Reset</button>
    </div>
  </div>
</div>

<script>
const presets = [
  "#E8493A","#4A90E2","#6DD47E","#F5C842","#9B59B6",
  "#FF6B35","#1A8CD8","#2ECC71","#E74C3C","#F39C12",
  "#3498DB","#1ABC9C","#8E44AD","#D35400","#27AE60",
  "#C0392B","#2980B9","#16A085","#7D3C98","#E67E22"
];

const itemDefs = {
  bag:    { parts: ['bag-body','bag-strap-top','bag-pocket','bag-zip','bag-sl','bag-sr'], mode:'fill', shades:[1,.85,.75,.6,.85,.85] },
  pencil: { parts: ['pencil-body','pencil-tip'], mode:'fill', shades:[1,.75] },
  book:   { parts: ['book-cover','book-spine'], mode:'fill', shades:[1,.8] },
  ruler:  { parts: ['ruler-body'], mode:'fill', shades:[1] },
  rocket: { parts: ['rocket-body','rocket-nose','rocket-fin-l','rocket-fin-r'], mode:'fill', shades:[1,.8,.9,.9] },
  crayon: { parts: ['crayon-body','crayon-top','crayon-tip','crayon-stripe'], mode:'fill', shades:[1,.75,.85,.9] },
  globe:  { parts: ['globe-ocean','globe-meridian','globe-parallel'], mode:'fill', shades:[1,0,0], strokeParts:['globe-meridian','globe-parallel'] },
  bottle: { parts: ['bottle-cap','bottle-body'], mode:'fill', shades:[.85,1] }
};

const originalColors = {
  bag: '#4A90E2', pencil: '#F5C842', book: '#E8493A',
  ruler: '#6DD47E', rocket: '#E74C3C', crayon: '#FF6B35',
  globe: '#1A8CD8', bottle: '#29B6F6'
};

let selectedItems = new Set();

function hexToRgb(hex) {
  return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
}
function shadeHex(hex, factor) {
  const {r,g,b} = hexToRgb(hex), f = Math.max(0, Math.min(1, factor));
  return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;
}
function applyColor(itemId, color) {
  const def = itemDefs[itemId];
  def.parts.forEach((pid, i) => {
    const el = document.getElementById(pid);
    if (!el) return;
    const shade = def.shades[i], col = shadeHex(color, shade);
    if (def.strokeParts && def.strokeParts.includes(pid)) { el.setAttribute('stroke', col); }
    else if (def.mode === 'stroke') { el.setAttribute('stroke', col); el.setAttribute('fill', shade===1?col:'none'); }
    else { if (shade > 0) el.setAttribute('fill', col); }
  });
}
function toggleItem(card) {
  const id = card.dataset.id;
  if (selectedItems.has(id)) { selectedItems.delete(id); card.classList.remove('selected'); }
  else { selectedItems.add(id); card.classList.add('selected'); }
  updateHint();
}
function updateHint() {
  const h = document.getElementById('sel-hint');
  h.textContent = selectedItems.size === 0
    ? 'Click cards above to select items'
    : `${selectedItems.size} item${selectedItems.size>1?'s':''} selected — pick a color`;
}
function applyToSelected(color) {
  if (selectedItems.size === 0) document.querySelectorAll('.card').forEach(c => applyColor(c.dataset.id, color));
  else selectedItems.forEach(id => applyColor(id, color));
}
function applyCustomColor(val) {
  document.querySelectorAll('#preset-palette .swatch').forEach(s => s.classList.remove('active'));
  applyToSelected(val);
}
function selectAll() {
  document.querySelectorAll('.card').forEach(c => { selectedItems.add(c.dataset.id); c.classList.add('selected'); });
  updateHint();
}
function deselectAll() {
  selectedItems.clear();
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  updateHint();
}
function randomize() {
  Object.keys(itemDefs).forEach(id => {
    applyColor(id, '#'+Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0'));
  });
}
function resetColors() {
  Object.keys(originalColors).forEach(id => applyColor(id, originalColors[id]));
}

const palette = document.getElementById('preset-palette');
presets.forEach(c => {
  const s = document.createElement('div');
  s.className = 'swatch'; s.style.background = c; s.title = c;
  s.onclick = () => {
    document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    document.getElementById('custom-color').value = c;
    applyToSelected(c);
  };
  palette.appendChild(s);
});
</script>
</body>
</html>
